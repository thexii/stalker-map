<div>
    <div class='popup header'>{{ 'stuff_at_location' | translate}}</div>
</div>
@if (items && items.length > 0) {
    <div class="inventory inventory-columns-7">
        @for (stuffItem of items; track stuffItem) {
            <app-hoc-inventory-item [stuffItem]="stuffItem"></app-hoc-inventory-item>
        }
    </div>
}
