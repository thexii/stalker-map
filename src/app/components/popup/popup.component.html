<div class="popup">
    <div class="content">
        <ng-content></ng-content>
    </div>
    <div class="popup-buttons">
        @if (marker) {
            <div class="button"><div [ngClass]="{'hide': !isMarkerHidden, 'show': isMarkerHidden}" (click)="hideShow()"></div></div>
        }
        @if (shareUrl) {
            <div class="button" (click)="share()"><div class="share"></div></div>
        }
        <div class="button" (click)="close()"><div class="close"></div></div>
    </div>
</div>
