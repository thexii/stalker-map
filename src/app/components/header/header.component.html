<header>
    <div class="container-fluid" #wrapper>
        <div class="menu" #container [ngClass]="{'short': showShort}">
            <div class="header-nav-item-left">
                <div class="header-nav-item-inner"></div>
            </div>
            <a class="header-nav-item header-nav-item-full" href="/map/shoc">
                <div class="header-nav-item-inner">
                    <span class="full" >{{ 'shoc' | translate }}</span>
                    <span class="short">{{ 'shocShort' | translate }}</span>
                </div>
            </a>
            <a class="header-nav-item header-nav-item-full" href="/map/cs">
                <div class="header-nav-item-inner">
                    <span class="full" >{{ 'cs' | translate }}</span>
                    <span class="short">{{ 'csShort' | translate }}</span>
                </div>
            </a>
            <a class="header-nav-item header-nav-item-full" href="/map/cop">
                <div class="header-nav-item-inner">
                    <span class="full" >{{ 'cop' | translate }}</span>
                    <span class="short">{{ 'copShort' | translate }}</span>
                </div>
            </a>
            <a class="header-nav-item header-nav-item-full" href="/map/hoc">
                <div class="header-nav-item-inner">
                    <span class="full" >{{ 'hoc' | translate }}</span>
                    <span class="short">{{ 'hocShort' | translate }}</span>
                </div>
            </a>
            <a class="header-nav-item not-grow" href="https://github.com/thexii/stalker-map">
                <div class="header-nav-item-inner">
                    <i class="header-nav-icon github"></i>
                </div>
            </a>
            <div class="header-nav-item-right">
                <div class="header-nav-item-inner">
                    <select class="language-selector" (change)="changeLanguage($event)">
                        @for (language of avaliableLanguages; track language) {
                            <option class="language-selector-option" [value]="language"
                                [selected]="selectedLanguage == language">{{language}}</option>
                        }
                    </select>
                </div>
            </div>
        </div>
        <ng-content></ng-content>
    </div>
</header>
